<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <tr>
        <td>
                <h1>회원가입 양식</h1>
        </td>
    </tr>
    <form action = "01.html" method = "get">
        <fieldset>
            <legend>개인 정보 입력</legend>
        성명: <input type = "text" name = "name"><br><br>
        이메일: <input type = "email" name = "email"><br>
        주소: <input type = "text" name = "address"><br><br>
        성별: <input type = "radio" name = "gender" value = "남성">남성 &nbsp;&nbsp;
             <input type = "radio" name = "gender" value = "여성">여성<br><br>
        취미: <input type = "checkbox" name = "hobby" value = "독서">독서 &nbsp;&nbsp;
             <input type = "checkbox" name = "hobby" value = "운동">운동 &nbsp;&nbsp;
             <input type = "checkbox" name = "hobby" value = "음악감상">음악감상<br><br>
        <input type = "submit" value = "가입하기"> &nbsp;&nbsp;
        <input type = "reset" value = "입력초기화">
        </fieldset>
    </form>
</body>
</html>
